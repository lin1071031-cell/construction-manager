<title>睿浤有限公司 工地管理</title>
<style>
:root{
  --bg:#F4F3EF; --surface:#fff; --ink:#20242A; --muted:#6B7178;
  --accent:#FF6A2B; --accent-bg:#FFE8DC; --navy:#28456E;
  --success:#4C8C5C; --warn:#D99A2B; --line:#E4E2DC;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;background:var(--bg);color:var(--ink);min-height:100vh;}
.app{display:flex;flex-direction:column;min-height:100vh;padding-bottom:70px;}

/* Topbar */
.topbar{display:flex;align-items:center;gap:10px;padding:12px 16px;background:var(--ink);color:#fff;position:sticky;top:0;z-index:20;}
.brand{font-weight:800;font-size:18px;letter-spacing:0.3px;}
.backup-actions{margin-left:auto;display:flex;gap:8px;}
.notice{padding:8px 14px;font-size:13px;font-weight:600;display:flex;align-items:center;gap:6px;}
.notice.ok{background:#EAF4EC;color:#2F6E42;}
.notice.err{background:#FBE7E2;color:#B3402A;}

/* Bottom nav */
.bottombar{display:flex;position:fixed;bottom:0;left:0;right:0;background:var(--surface);border-top:1px solid var(--line);z-index:20;}
.bnav-btn{flex:1;display:flex;flex-direction:column;align-items:center;gap:2px;padding:8px 4px 6px;border:none;background:none;color:var(--muted);font-size:10px;font-weight:600;cursor:pointer;}
.bnav-btn.active{color:var(--accent);}
.bnav-icon{font-size:18px;line-height:1;}

/* Page */
.page{max-width:900px;margin:0 auto;padding:20px 16px;}
.page-head{margin-bottom:18px;}
.page-head h1{font-size:26px;font-weight:800;margin-bottom:2px;}
.muted{color:var(--muted);font-size:13px;}
.row-between{display:flex;justify-content:space-between;align-items:flex-end;gap:10px;flex-wrap:wrap;}

/* Cards */
.card{background:var(--surface);border:1px solid var(--line);border-radius:12px;padding:14px;margin-bottom:10px;}
.card-row{display:flex;align-items:center;gap:10px;}
.avatar{width:38px;height:38px;border-radius:50%;background:var(--navy);color:#fff;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:16px;flex-shrink:0;}
.avatar.sm{width:28px;height:28px;font-size:13px;}
.card-info{flex:1;min-width:0;}
.card-info strong{display:block;font-size:15px;}
.card-actions{display:flex;gap:4px;margin-left:auto;}

/* Buttons */
.btn{display:inline-flex;align-items:center;gap:6px;border:none;border-radius:10px;padding:9px 14px;font-weight:700;font-size:13px;cursor:pointer;}
.btn.primary{background:var(--accent);color:#fff;}
.btn.ghost{background:rgba(255,255,255,0.12);color:#fff;padding:7px 10px;font-size:12px;}
.btn.sm{padding:6px 10px;font-size:12px;}
.btn.danger{background:#FBE7E2;color:#B3402A;}
.btn.full{width:100%;justify-content:center;margin-top:8px;}
.icon-btn{border:none;background:none;padding:6px;border-radius:8px;cursor:pointer;color:var(--muted);font-size:16px;line-height:1;}
.icon-btn:hover{background:#F1EFE9;}
.icon-btn.red:hover{background:#FBE7E2;color:#B3402A;}

/* Form */
.form{display:flex;flex-direction:column;gap:12px;}
.field{display:flex;flex-direction:column;gap:5px;font-size:13px;font-weight:600;color:var(--muted);}
.field input,.field select,.field textarea{border:1px solid var(--line);border-radius:9px;padding:9px 10px;font-size:14px;color:var(--ink);background:var(--surface);width:100%;}
.field textarea{min-height:80px;resize:vertical;}

/* Modal */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.45);display:flex;align-items:center;justify-content:center;z-index:50;padding:16px;}
.modal{background:var(--surface);border-radius:16px;width:100%;max-width:400px;max-height:90vh;overflow-y:auto;}
.modal-head{display:flex;justify-content:space-between;align-items:center;padding:14px 16px;border-bottom:1px solid var(--line);}
.modal-head h3{font-size:17px;font-weight:800;}
.modal-body{padding:16px;}

/* Status badges */
.badge{display:inline-block;font-size:12px;font-weight:700;padding:3px 10px;border-radius:99px;}
.badge-present{background:#EAF4EC;color:#4C8C5C;}
.badge-half{background:#FBF1DF;color:#D99A2B;}
.badge-leave{background:#F1F1EF;color:#9AA0A6;}
.badge-typhoon{background:#E4ECF7;color:#5B7FBE;}
.badge-holiday{background:#F5E8F5;color:#C070C0;}

/* Chips */
.chips{display:flex;flex-wrap:wrap;gap:6px;margin-top:6px;}
.chip{border:1px solid var(--line);background:var(--surface);border-radius:99px;padding:5px 12px;font-size:12px;font-weight:700;cursor:pointer;color:var(--muted);}
.chip.on-present{background:#EAF4EC;color:#4C8C5C;border-color:#4C8C5C;}
.chip.on-half{background:#FBF1DF;color:#D99A2B;border-color:#D99A2B;}
.chip.on-leave{background:#F1F1EF;color:#9AA0A6;border-color:#9AA0A6;}
.chip.on-typhoon{background:#E4ECF7;color:#5B7FBE;border-color:#5B7FBE;}
.chip.on-holiday{background:#F5E8F5;color:#C070C0;border-color:#C070C0;}
.chip.on-site{background:#E2EBF3;color:var(--navy);border-color:var(--navy);}
.chip.on-ot{background:var(--accent-bg);color:var(--accent);border-color:var(--accent);}

/* Date nav */
.date-nav{display:flex;align-items:center;gap:10px;margin-bottom:14px;}
.date-nav input{border:1px solid var(--line);border-radius:10px;padding:8px 10px;font-size:14px;}

/* Table */

/* Project row */

.proj-info{flex:1;}

.status-tag{font-size:11px;font-weight:700;padding:2px 8px;border-radius:6px;display:inline-block;margin-top:2px;}

/* Calendar */

.cal-head{text-align:center;font-size:11px;font-weight:700;color:var(--muted);padding:4px 0;}
.cal-cell{border:1px solid var(--line);border-radius:6px;min-height:40px;padding:3px;background:var(--surface);}
.cal-cell.empty{background:transparent;border:none;}

/* Yearly */

</style>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script><script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script></head>
<body>
<div class="app" id="app"></div>

<script>
// ============================================================
// 資料管理
// ============================================================
const EMPTY = {employees:[],projects:[],attendance:[],ledger:[],payments:[],expenses:[],billings:[],insurances:[],invoices:[]};
let DB = EMPTY;
try{
  const s=localStorage.getItem('construction-mgr');
  if(s){
    const parsed=JSON.parse(s);
    DB={...EMPTY,...parsed,payments:parsed.payments||[],expenses:parsed.expenses||[],billings:parsed.billings||[],insurances:parsed.insurances||[],invoices:parsed.invoices||[]};
    // 遷移舊資料：overtimeProjectIds (boolean) → overtimes [{projectId, amount}]
    DB.attendance=DB.attendance.map(a=>{
      if(a.overtimeProjectIds&&!a.overtimes){
        return {...a, overtimes:(a.overtimeProjectIds||[]).map(pid=>({projectId:pid,amount:1}))};
      }
      if(!a.overtimes) return {...a, overtimes:[]};
      return a;
    });
  }
}catch{}


// 自訂確認對話框（iOS Safari 相容）
let _pendingConfirm = null;
function customConfirm(message, onConfirm){
  _pendingConfirm = onConfirm;
  openModal('確認', `
    <p style="margin-bottom:20px;font-size:15px;line-height:1.6">${message}</p>
    <div style="display:flex;gap:10px">
      <button class="btn full" style="background:#F1EFE9;color:var(--ink)" onclick="closeModal()">取消</button>
      <button class="btn primary full" onclick="closeModal();if(_pendingConfirm){_pendingConfirm();_pendingConfirm=null;}">確定</button>
    </div>
  `);
}

function save(){ try{ localStorage.setItem('construction-mgr', JSON.stringify(DB)); }catch{} }

function setDB(next){ DB=next; save(); render(); }

const todayStr = () => { const d=new Date(); return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`; };
const monthStr = () => { const d=new Date(); return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`; };
const uid = () => Math.random().toString(36).slice(2,10);
const fmt = n => "$" + Math.round(n||0).toLocaleString('zh-TW');

const STATUS = {
  present: {label:"出勤", cls:"present", paid:true},
  half:    {label:"半天", cls:"half",    paid:true, mult:0.5},
  leave:   {label:"請假", cls:"leave",   paid:false},
  typhoon: {label:"颱風假", cls:"typhoon", paid:false},
  holiday: {label:"放假", cls:"holiday", paid:false},
};
const NO_SITE = new Set(["leave","typhoon","holiday"]);
const baseMult = s => STATUS[s]?.paid ? (s==="half"?0.5:1) : 0;
const getRateForDate = (emp, date) => {
  const h = (emp.rateHistory||[]).slice().sort((a,b)=>b.from.localeCompare(a.from));
  const m = h.find(r=>r.from<=date);
  return m ? m.rate : (emp.dailyRate||0);
};
// 取得某員工在某工地的加班天數
const getOtAmount = (att, projectId) => {
  const ot=(att?.overtimes||[]).find(x=>x.projectId===projectId);
  return ot ? (ot.amount||0) : 0;
};
// 取得某員工當天總加班天數
const getTotalOt = (att) => (att?.overtimes||[]).reduce((s,x)=>s+(x.amount||0),0);

// ============================================================
// App 狀態
// ============================================================
let currentTab = "dashboard";
let modalHtml = null;

// ============================================================
// 工具
// ============================================================
function el(tag, cls, html){ const e=document.createElement(tag); if(cls)e.className=cls; if(html!==undefined)e.innerHTML=html; return e; }
function badge(status){ const m=STATUS[status]; return `<span class="badge badge-${m?.cls||'leave'}">${m?.label||status}</span>`; }
function emptyState(icon, title, sub){ return `<div class="empty"><div class="empty-icon">${icon}</div><div class="empty-title">${title}</div><p class="muted">${sub}</p></div>`; }

// ============================================================
// 通知
// ============================================================
let noticeTimer = null;
function showNotice(type, msg){
  const el = document.getElementById('notice');
  if(!el) return;
  el.className = 'notice ' + type;
  el.innerHTML = msg;
  el.style.display = 'flex';
  if(noticeTimer) clearTimeout(noticeTimer);
  noticeTimer = setTimeout(()=>{ el.style.display='none'; }, 3000);
}

// ============================================================
// 備份 / 匯出
// ============================================================
function exportData(){
  try{
    const blob = new Blob([JSON.stringify(DB,null,2)],{type:'application/json'});
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href=url; a.download='工地管理系統備份_'+todayStr()+'.json';
    document.body.appendChild(a); a.click(); a.remove();
    URL.revokeObjectURL(url);
    showNotice('ok','✓ 已下載備份檔');
  }catch{ showBackupCopyModal(); }
}
function showBackupCopyModal(){
  openModal('備份資料', `
    <p class="muted" style="margin-bottom:10px">複製以下所有文字，貼到備忘錄保存。還原時點「匯入備份」把整段文字貼回。</p>
    <textarea id="backupText" style="width:100%;height:160px;font-size:11px;font-family:monospace;border:1px solid var(--line);border-radius:8px;padding:8px;" readonly>${JSON.stringify(DB,null,2)}</textarea>
    <button class="btn primary full" onclick="document.getElementById('backupText').select();document.execCommand('copy');showNotice('ok','已複製')">複製全部</button>
  `);
  setTimeout(()=>{ const t=document.getElementById('backupText'); if(t)t.select(); },100);
}
function showImportModal(){
  openModal('還原資料', `
    <p class="muted" style="margin-bottom:14px">選擇備份檔案，或貼上備份文字</p>
    <div style="background:var(--accent-bg);border:2px dashed var(--accent);border-radius:12px;padding:20px;text-align:center;margin-bottom:14px">
      <div style="font-size:28px;margin-bottom:8px">📂</div>
      <p style="font-weight:700;margin-bottom:8px">選擇備份檔案（.json）</p>
      <label style="display:inline-block;background:var(--accent);color:#fff;padding:9px 18px;border-radius:10px;font-weight:700;font-size:13px;cursor:pointer">
        選擇檔案
        <input type="file" accept=".json,application/json,text/plain" style="position:absolute;opacity:0;width:0;height:0" onchange="importFromFile(this)">
      </label>
      <p id="file-name" class="muted" style="margin-top:8px;font-size:12px"></p>
    </div>
    <p class="muted" style="text-align:center;margin-bottom:10px">── 或貼上備份文字 ──</p>
    <textarea id="importText" style="width:100%;height:100px;font-size:11px;font-family:monospace;border:1px solid var(--line);border-radius:8px;padding:8px;" placeholder="貼上備份內容…"></textarea>
    <button class="btn primary full" onclick="doImport()" style="margin-top:8px">✓ 還原資料</button>
  `);
}
function importFromFile(input){
  const file = input.files[0];
  if(!file) return;
  const fn = document.getElementById('file-name');
  if(fn) fn.textContent = '已選擇：' + file.name;
  const reader = new FileReader();
  reader.onload = e => {
    try{
      const parsed = JSON.parse(e.target.result);
      applyImport(parsed);
    }catch{ showNotice('err','✗ 檔案格式錯誤'); }
  };
  reader.readAsText(file);
}
function doImport(){
  try{
    const t = document.getElementById('importText');
    if(!t.value.trim()){ showNotice('err','請選擇檔案或貼上備份內容'); return; }
    const parsed = JSON.parse(t.value);
    applyImport(parsed);
  }catch{ showNotice('err','✗ 格式錯誤，請確認內容完整'); }
}
function applyImport(parsed){
  setDB({
    employees:  Array.isArray(parsed.employees)?parsed.employees:[],
    projects:   Array.isArray(parsed.projects)?parsed.projects:[],
    attendance: Array.isArray(parsed.attendance)?parsed.attendance:[],
    ledger:     Array.isArray(parsed.ledger)?parsed.ledger:[],
    payments:   Array.isArray(parsed.payments)?parsed.payments:[],
    expenses:   Array.isArray(parsed.expenses)?parsed.expenses:[],
    billings:   Array.isArray(parsed.billings)?parsed.billings:[],
    invoices:   Array.isArray(parsed.invoices)?parsed.invoices:[],
  });
  closeModal();
  showNotice('ok','✓ 已匯入備份');
}

// ============================================================
// Modal
// ============================================================
function openModal(title, bodyHtml){
  const overlay = document.getElementById('modal-overlay');
  document.getElementById('modal-title').textContent = title;
  document.getElementById('modal-body').innerHTML = bodyHtml;
  overlay.style.display = 'flex';
}
function closeModal(){ document.getElementById('modal-overlay').style.display='none'; }

// ============================================================
// 導覽
// ============================================================
function switchTab(tab){
  currentTab = tab;
  render();
}

// ============================================================
// 各頁面 HTML
// ============================================================
function pageContent(){
  switch(currentTab){
    case 'dashboard': return renderDashboard();
    case 'employees': return renderEmployees();
    case 'attendance': return renderAttendance();
    case 'projects':  return renderProjects();
    case 'wages':     return renderWages();
    case 'ledger':    return renderLedger();
    case 'billing':   return renderBilling();
    case 'invoice':   return renderInvoice();
    default: return '';
  }
}

// ---- 總覽 ----
let dashQueryMonth = monthStr();
let dashQueryYear = String(new Date().getFullYear());
let dashViewMode = 'month'; // 'month' | 'year'

function calcFinancialSummary(filterFn){
  // 計算所有工地的合計收入、支出、損益
  const empMap = Object.fromEntries(DB.employees.map(e=>[e.id,e]));
  let totalReceived=0, totalLabor=0, totalExpenses=0, totalInsurance=0, totalContract=0;
  DB.projects.forEach(p=>{
    // 收款
    const pays=(DB.payments||[]).filter(x=>x.projectId===p.id&&filterFn(x.date));
    totalReceived+=pays.reduce((s,x)=>s+x.amount,0);
    // 合約金額
    totalContract+=p.contractAmount||0;
    // 人事成本（依出勤日期篩選）
    const att=DB.attendance.filter(a=>filterFn(a.date)&&!NO_SITE.has(a.status)&&(a.projectIds||[]).includes(p.id));
    att.forEach(a=>{
      const emp=empMap[a.employeeId]; if(!emp)return;
      const base=baseMult(a.status);
      const otAmt=getOtAmount(a,p.id);
      totalLabor+=getRateForDate(emp,a.date)*(base+otAmt);
    });
    // 其他支出
    const exps=(DB.expenses||[]).filter(x=>x.projectId===p.id&&filterFn(x.date));
    totalExpenses+=exps.reduce((s,x)=>s+(x.amount||0),0);
    // 保險費用
    const ins=(DB.insurances||[]).filter(x=>x.projectId===p.id&&filterFn(x.paymentDate));
    ins.forEach(x=>{
      totalInsurance+=(x.amount||0);
      (x.renewals||[]).forEach(r=>{ if(filterFn(r.startDate||x.paymentDate)) totalInsurance+=(r.amount||0); });
    });
  });
  const totalCost=totalLabor+totalExpenses+totalInsurance;
  const profit=totalReceived-totalCost;
  return {totalReceived,totalLabor,totalExpenses,totalInsurance,totalCost,profit,totalContract};
}

function renderDashboard(){
  const today = todayStr();
  const month = monthStr();
  const todayAtt = DB.attendance.filter(a=>a.date===today);
  const monthAtt = DB.attendance.filter(a=>a.date.startsWith(month));
  const empMap = Object.fromEntries(DB.employees.map(e=>[e.id,e]));
  const projMap = Object.fromEntries(DB.projects.map(p=>[p.id,p]));
  const monthCost = monthAtt.reduce((s,a)=>{
    const emp=empMap[a.employeeId]; if(!emp)return s;
    const m=baseMult(a.status)+getTotalOt(a);
    return s+getRateForDate(emp,a.date)*m;
  },0);
  const ongoing = DB.projects.filter(p=>p.status==='進行中').length;
  const retention = DB.ledger.filter(l=>l.type==='retention'&&!l.settled).reduce((s,l)=>s+l.amount,0);
  const presentToday = todayAtt.filter(a=>STATUS[a.status]?.paid).length;

  let todayRows = '';
  todayAtt.forEach(a=>{
    const emp=empMap[a.employeeId];
    const sites=(a.projectIds||[]).map(id=>projMap[id]?.name).filter(Boolean).join('、')||'未指定工地';
    todayRows+=`<div class="table-row cols3"><span style="font-weight:700">${emp?.name||'—'}</span><span class="muted">${sites}</span>${badge(a.status)}</div>`;
  });

  // 財務總覽計算
  const isMonth = dashViewMode==='month';
  const filterFn = isMonth
    ? date=>(date||'').startsWith(dashQueryMonth)
    : date=>(date||'').startsWith(dashQueryYear);
  const fin = calcFinancialSummary(filterFn);
  const periodLabel = isMonth ? dashQueryMonth : dashQueryYear+'年';

  return `<div class="page">
    <div class="page-head"><h1>今日總覽</h1><p class="muted">${today}</p></div>
    <div class="stat-grid">
      <div class="stat-card dark"><span class="stat-label">今日出勤</span><span class="stat-value">${presentToday}<small style="font-size:14px;color:#B8BCC2">/${DB.employees.length}</small></span></div>
      <div class="stat-card"><span class="stat-label">本月人事成本</span><span class="stat-value mono" style="font-size:18px">${fmt(monthCost)}</span></div>
      <div class="stat-card"><span class="stat-label">進行中工程</span><span class="stat-value">${ongoing}</span></div>
      <div class="stat-card"><span class="stat-label">未結保留款</span><span class="stat-value mono" style="font-size:18px">${fmt(retention)}</span></div>
    </div>

    <div class="card" style="margin-bottom:12px">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;flex-wrap:wrap;gap:8px">
        <h3 style="font-size:15px;font-weight:800">📊 所有工地財務總覽</h3>
        <div style="display:flex;gap:6px;align-items:center;flex-wrap:wrap">
          <button class="period-btn ${isMonth?'on':''}" style="font-size:12px;padding:5px 10px" onclick="dashViewMode='month';render()">月份</button>
          <button class="period-btn ${!isMonth?'on':''}" style="font-size:12px;padding:5px 10px" onclick="dashViewMode='year';render()">年度</button>
          ${isMonth
            ? `<input type="month" value="${dashQueryMonth}" onchange="dashQueryMonth=this.value;render()" style="border:1px solid var(--line);border-radius:8px;padding:5px 8px;font-size:13px">`
            : `<input type="number" value="${dashQueryYear}" min="2020" max="2099" onchange="dashQueryYear=this.value;render()" style="border:1px solid var(--line);border-radius:8px;padding:5px 8px;font-size:13px;width:80px">`
          }

function saveEmployee(){
  const id = document.getElementById('emp-id').value;

  document.querySelectorAll('.rate-row').forEach(row=>{

function setAttStatus(empId, status){
  const idx=DB.attendance.findIndex(a=>a.employeeId===empId&&a.date===attDate);
  let att;
  if(idx>=0){ att={...DB.attendance[idx],status}; if(NO_SITE.has(status)){att.projectIds=[];att.overtimes=[];} }
  else { att={id:uid(),employeeId:empId,date:attDate,status,projectIds:[],overtimes:[]}; }
  const next=idx>=0?DB.attendance.map((a,i)=>i===idx?att:a):[...DB.attendance,att];
  setDB({...DB,attendance:next});
}
function clearAttStatus(empId){
  const next=DB.attendance.filter(a=>!(a.employeeId===empId&&a.date===attDate));
  setDB({...DB,attendance:next});
}
// 從工地視角：點員工 = 切換該員工在此工地的出勤
function toggleEmpSite(empId, projectId){
  const idx=DB.attendance.findIndex(a=>a.employeeId===empId&&a.date===attDate);
  if(idx<0){
    const att={id:uid(),employeeId:empId,date:attDate,status:'present',projectIds:[projectId],overtimes:[]};
    setDB({...DB,attendance:[...DB.attendance,att]});
    return;
  }
  const att={...DB.attendance[idx]};
  const cur=att.projectIds||[];
  const isOn=cur.includes(projectId);
  att.projectIds=isOn?cur.filter(id=>id!==projectId):[...cur,projectId];
  if(isOn) att.overtimes=(att.overtimes||[]).filter(x=>x.projectId!==projectId);
  if(!att.overtimes) att.overtimes=[];
  if(!att.status||att.status==='') att.status='present';
  setDB({...DB,attendance:DB.attendance.map((a,i)=>i===idx?att:a)});
}
function toggleOtSite(empId, projectId){
  // 循環切換：無 → 半天(0.5) → 全天(1) → 無
  const idx=DB.attendance.findIndex(a=>a.employeeId===empId&&a.date===attDate);
  if(idx<0) return;
  const att={...DB.attendance[idx]};
  const overtimes=[...(att.overtimes||[])];
  const existing=overtimes.find(x=>x.projectId===projectId);
  if(!existing){
    overtimes.push({projectId, amount:0.5});
  } else if(existing.amount===0.5){
    existing.amount=1;
  } else {
    att.overtimes=overtimes.filter(x=>x.projectId!==projectId);
    setDB({...DB,attendance:DB.attendance.map((a,i)=>i===idx?att:a)});
    return;
  }
  att.overtimes=overtimes;
  setDB({...DB,attendance:DB.attendance.map((a,i)=>i===idx?att:a)});
}
function toggleSite(empId, projectId){ toggleEmpSite(empId, projectId); }
function toggleOt(empId, projectId){ toggleOtSite(empId, projectId); }

function renderCalendar(){
  const [y,m]=calMonth.split('-').map(Number);
  const firstDay=new Date(y,m-1,1).getDay();
  const daysInMonth=new Date(y,m,0).getDate();
  const monthAtt=DB.attendance.filter(a=>{
    if(!a.date.startsWith(calMonth))return false;
    if(calEmployee&&a.employeeId!==calEmployee)return false;
    return true;
  });
  const attByDate={};
  monthAtt.forEach(a=>{if(!attByDate[a.date])attByDate[a.date]=[];attByDate[a.date].push(a);});
  const projMap=Object.fromEntries(DB.projects.map(p=>[p.id,p]));
  const empMap=Object.fromEntries(DB.employees.map(e=>[e.id,e]));
  let heads='<div class="cal-head">日</div><div class="cal-head">一</div><div class="cal-head">二</div><div class="cal-head">三</div><div class="cal-head">四</div><div class="cal-head">五</div><div class="cal-head">六</div>';
  let cells=Array(firstDay).fill('<div class="cal-cell empty"></div>').join('');
  for(let d=1;d<=daysInMonth;d++){
    const ds=calMonth+'-'+String(d).padStart(2,'0');
    const atts=attByDate[ds]||[];
    const isPaid=atts.some(a=>STATUS[a.status]?.paid);
    const isLeave=atts.length>0&&atts.every(a=>!STATUS[a.status]?.paid);
    const hasOt=atts.some(a=>getTotalOt(a)>0);
    const isSelected=calDetailDate===ds;
    const cls=isPaid?'paid':isLeave?'leave':'';
    // 格子內顯示員工或狀態
    let inner='';
    if(calEmployee){
      // 單一員工：顯示狀態標籤
      if(atts.length>0){
        const st=atts[0].status;
        const sm=STATUS[st];
        inner=`<span style="font-size:9px;background:${isPaid?'#4C8C5C':isLeave?'#9AA0A6':'#9AA0A6'};color:#fff;border-radius:3px;padding:1px 4px;margin-top:2px;display:inline-block">${sm?.label||''}</span>`;
      }
    } else {
      // 全員：顯示出勤人數
      const cnt=atts.filter(a=>STATUS[a.status]?.paid).length;
      if(cnt>0) inner=`<span style="font-size:10px;font-weight:700;color:var(--success)">${cnt}人</span>`;
    }
    cells+=`<div class="cal-cell ${cls}${isSelected?' sel':''}" onclick="calDetailDate=calDetailDate==='${ds}'?'':'${ds}';render()" style="cursor:${atts.length?'pointer':'default'}${isSelected?';border-color:var(--accent);border-width:2px':''}">
      <span class="cal-day">${d}</span>
      ${inner}
      ${hasOt?'<span class="cal-ot">加</span>':''}
    </div>`;
  }
  const prevM=new Date(y,m-2,1); const nextM=new Date(y,m,1);
  const pms=`${prevM.getFullYear()}-${String(prevM.getMonth()+1).padStart(2,'0')}`;
  const nms=`${nextM.getFullYear()}-${String(nextM.getMonth()+1).padStart(2,'0')}`;
  let empOpts='<option value="">所有員工</option>';
  DB.employees.forEach(e=>{ empOpts+=`<option value="${e.id}" ${calEmployee===e.id?'selected':''}>${e.name}</option>`; });
  const paidAtt=monthAtt.filter(a=>STATUS[a.status]?.paid);
  const totalDays=paidAtt.reduce((s,a)=>s+(a.status==='half'?0.5:1),0);
  const otDays=monthAtt.filter(a=>getTotalOt(a)>0).length;

  // 點選日期的明細
  let detailPanel='';
  if(calDetailDate && attByDate[calDetailDate]){
    const datAtts=attByDate[calDetailDate];
    let rows='';
    datAtts.forEach(a=>{
      const emp=empMap[a.employeeId];
      const sites=(a.projectIds||[]).map(id=>projMap[id]?.name).filter(Boolean).join('、')||'—';
      const otAmt=getTotalOt(a);const ot=otAmt>0?`＋加班${otAmt===0.5?'½':''}`:'';
      rows+=`<div class="table-row cols3">
        <span style="font-weight:700">${emp?.name||'—'}</span>
        ${badge(a.status)}
        <span class="muted" style="font-size:12px">${sites}${ot}</span>
      </div>`;
    });
    detailPanel=`<div class="card" style="margin-bottom:12px;border-color:var(--accent)">
      <h3 style="font-size:13px;font-weight:800;margin-bottom:8px">📅 ${calDetailDate} 出勤明細</h3>
      ${rows}
    </div>`;
  }

  return `<div class="page">
    <div class="row-between page-head">
      <div><h1>出勤月曆</h1><p class="muted">點日期格子查看明細</p></div>
      <div class="period-sw" style="margin:0">
        <button class="period-btn" onclick="attMode='checkin';render()">打卡</button>
        <button class="period-btn on" onclick="attMode='calendar';render()">月曆</button>
      </div>
    </div>
    <div style="display:flex;gap:10px;align-items:center;margin-bottom:12px;flex-wrap:wrap">
      <div class="date-nav" style="margin:0">
        <button class="icon-btn" onclick="calMonth='${pms}';calDetailDate='';render()">◀</button>
        <input type="month" value="${calMonth}" onchange="calMonth=this.value;calDetailDate='';render()" style="font-size:15px;font-weight:800;border:none;background:none;outline:none;cursor:pointer;text-align:center">
        <button class="icon-btn" onclick="calMonth='${nms}';calDetailDate='';render()">▶</button>
      </div>
      <select style="border:1px solid var(--line);border-radius:8px;padding:7px 8px;font-size:13px" onchange="calEmployee=this.value;calDetailDate='';render()">${empOpts}</select>
    </div>
    ${calEmployee?`<div style="display:flex;gap:16px;background:var(--surface);border:1px solid var(--line);border-radius:10px;padding:10px 14px;margin-bottom:12px;font-size:14px"><span>本月出勤 <strong style="color:var(--accent)">${totalDays}</strong> 天</span>${otDays>0?`<span>加班 <strong style="color:var(--accent)">${otDays}</strong> 天</span>`:''}</div>`:''}
    <div class="cal-grid">${heads}${cells}</div>
    ${detailPanel}
  </div>`;
}

// 工程搜尋
let projSearch = '';
let projExpanded = {};
function buildProjBlocks(filter){
  const filteredProjects = DB.projects.filter(p=>p.name.includes(filter||(projSearch||''))||(p.address||'').includes(filter||(projSearch||'')));
  if(DB.projects.length===0) return emptyState('🏗️','尚未建立任何工程','新增工地後即可在打卡時指派員工');
  if(filteredProjects.length===0) return emptyState('🔍','找不到符合的工程','試試其他關鍵字');
  const empMap=Object.fromEntries(DB.employees.map(e=>[e.id,e]));
  let blocks='';
  filteredProjects.forEach(p=>{
    const att=DB.attendance.filter(a=>(a.projectIds||[]).includes(p.id)&&!NO_SITE.has(a.status));
    const attDates=att.map(a=>a.date).sort();
    const firstAtt=attDates[0]||null;
    const lastAtt=attDates[attDates.length-1]||null;
    const startDate=p.startDate||firstAtt;
    const endDate=p.endDate||(p.status==='已完工'?lastAtt:null);
    const byEmp={};
    att.forEach(a=>{
      const emp=empMap[a.employeeId]; if(!emp)return;
      const base=baseMult(a.status);
      const otAmt=getOtAmount(a,p.id);
      const units=base+otAmt;
      const rate=getRateForDate(emp,a.date);
      if(!byEmp[emp.id]) byEmp[emp.id]={emp,days:0,otDays:0,gross:0,dates:[]};
      byEmp[emp.id].days+=base;
      byEmp[emp.id].otDays+=otAmt>0?1:0;
      byEmp[emp.id].gross+=units*rate;
      byEmp[emp.id].dates.push(a.date);
    });
    const empRows=Object.values(byEmp)
      .map(r=>({...r, firstDate:[...new Set(r.dates)].sort()[0]||''}))
      .sort((a,b)=>a.firstDate.localeCompare(b.firstDate));
    const sysCost=empRows.reduce((s,r)=>s+r.gross,0);
    const laborTotal=sysCost+(p.previousCost||0);

    // 收款與支出資料
    const projPayments=(DB.payments||[]).filter(x=>x.projectId===p.id).sort((a,b)=>a.date.localeCompare(b.date));
    const projExpenses=(DB.expenses||[]).filter(x=>x.projectId===p.id).sort((a,b)=>a.date.localeCompare(b.date));
    const projInsurances=(DB.insurances||[]).filter(x=>x.projectId===p.id);
    const totalReceived=projPayments.reduce((s,x)=>s+x.amount,0);
    const totalExpenses=projExpenses.reduce((s,x)=>s+(x.amount||0),0);
    const pendingExpenses=projExpenses.filter(x=>x.pending||x.amount===null).length;
    // 保險費用 = 原始金額 + 所有續保金額
    const totalInsurance=projInsurances.reduce((s,x)=>{
      const renewals=(x.renewals||[]).reduce((rs,r)=>rs+(r.amount||0),0);
      return s+(x.amount||0)+renewals;
    },0);
    const totalCost=laborTotal+totalExpenses+totalInsurance;
    const contract=p.contractAmount||0;
    const unpaid=contract-totalReceived;
    const profit=totalReceived-totalCost;

    const tagCls=p.status==='進行中'?'ongoing':p.status==='已完工'?'done':'pending';
    const isOpen=projExpanded[p.id];
    const projView=projExpanded['view_'+p.id]||'labor'; // 'labor'|'cashflow'

    // 人事明細
    let laborDetails='';
    if(p.previousCost>0) laborDetails+=`<div class="detail-row" style="background:#FBF1DF"><span class="muted">系統前歷史金額</span><span>—</span><span class="mono warn-c">${fmt(p.previousCost)}</span></div>`;
    empRows.forEach(r=>{
      const uniqueDates=[...new Set(r.dates)].sort();
      // 依月份分組
      const byMonth={};
      uniqueDates.forEach(d=>{ const ym=d.slice(0,7); if(!byMonth[ym])byMonth[ym]=[]; byMonth[ym].push(d); });
      let datePills='';
      Object.entries(byMonth).sort(([a],[b])=>a.localeCompare(b)).forEach(([ym,days])=>{
        const key='dm_'+p.id+'_'+r.emp.id+'_'+ym;
        const isMonthOpen=projExpanded[key];
        const label=ym.slice(0,4)+'年'+ym.slice(5)+'月 '+days.length+'天';
        datePills+=`<button class="date-pill" style="cursor:pointer;border:none" onclick="projExpanded['${key}']=!projExpanded['${key}'];render()">${label} ${isMonthOpen?'▲':'▼'}</button>`;
        if(isMonthOpen){ days.forEach(d=>{ datePills+=`<span class="date-pill" style="background:#fff;border:1px solid var(--accent)">${d.slice(5)}</span>`; }); }
      });
      laborDetails+=`<div class="detail-row"><span class="muted">${r.emp.name}</span><span class="mono">${r.days}天${r.otDays?'(+加班'+r.otDays+')':''}</span><span class="mono">${fmt(r.gross)}</span></div>
      <div style="padding:2px 14px 8px;background:#FAF9F6;">${datePills}</div>`;
    });
    laborDetails+=`<div class="detail-row" style="font-weight:700;border-top:1px solid var(--line)"><span>人事成本合計</span><span></span><span class="mono">${fmt(laborTotal)}</span></div>`;

    // 收支明細（用字串拼接避免巢狀模板字串問題）
    let cashDetails='';
    cashDetails+=`<div style="padding:10px 14px 6px;font-weight:700;font-size:13px;color:var(--muted)">📋 收支總覽</div>`;
    cashDetails+=`<div class="detail-row" style="background:#EAF4EC"><span>合約總金額</span><span></span><span class="mono" style="color:var(--success);font-weight:800">${fmt(contract)}</span></div>`;
    cashDetails+=`<div class="detail-row"><span class="muted">已收款</span><span></span><span class="mono">${fmt(totalReceived)}</span></div>`;
    cashDetails+=`<div class="detail-row" style="${unpaid>0?'background:#FBE7E2':''}"><span class="muted">未收款</span><span></span><span class="mono" style="${unpaid>0?'color:#B3402A':''}">${fmt(unpaid)}</span></div>`;
    cashDetails+=`<div class="detail-row"><span class="muted">人事成本</span><span></span><span class="mono warn-c">-${fmt(laborTotal)}</span></div>`;
    cashDetails+=`<div class="detail-row"><span class="muted">其他支出</span><span></span><span class="mono warn-c">-${fmt(totalExpenses)}</span></div>`;
    if(totalInsurance>0) cashDetails+=`<div class="detail-row"><span class="muted">保險費用</span><span></span><span class="mono warn-c">-${fmt(totalInsurance)}</span></div>`;
    cashDetails+=`<div class="detail-row" style="font-weight:700;border-top:1px solid var(--line);${profit>=0?'background:#EAF4EC':'background:#FBE7E2'}"><span>損益（已收－支出）</span><span></span><span class="mono" style="font-size:15px;color:${profit>=0?'var(--success)':'#B3402A'}">${profit>=0?'+':''}${fmt(profit)}</span></div>`;

    // 收款紀錄
    cashDetails+=`<div style="padding:10px 14px 6px;font-weight:700;font-size:13px;color:var(--muted);margin-top:4px">💰 收款紀錄 <button class="btn sm" style="margin-left:8px" onclick="editPayment(null,'${p.id}')">＋ 新增</button></div>`;
    if(projPayments.length===0){ cashDetails+='<p class="muted" style="padding:4px 14px 10px;font-size:13px">尚無收款紀錄</p>'; }
    else { projPayments.forEach(x=>{ cashDetails+=`<div class="detail-row" style="grid-template-columns:80px 1fr auto auto auto"><span class="muted">${x.date}</span><span>${x.note||'—'}</span><span class="mono" style="color:var(--success)">${fmt(x.amount)}</span><button class="icon-btn" style="font-size:12px" onclick="editPayment('${x.id}','')">✏️</button><button class="icon-btn red" style="font-size:12px" onclick="deletePayment('${x.id}')">✕</button></div>`; }); }

    // 其他支出（依類別分組）
    cashDetails+=`<div style="padding:10px 14px 6px;font-weight:700;font-size:13px;color:var(--muted);margin-top:4px">🧾 其他支出 <button class="btn sm" style="margin-left:8px" onclick="editExpense(null,'${p.id}')">＋ 新增</button></div>`;
    if(projExpenses.length===0){ cashDetails+='<p class="muted" style="padding:4px 14px 10px;font-size:13px">尚無支出紀錄</p>'; }
    else {
      const bycat={};
      projExpenses.forEach(x=>{ const c=x.category||'其他'; if(!bycat[c])bycat[c]=[]; bycat[c].push(x); });
      const allCats=[...new Set([...DEFAULT_EXP_CATS,...Object.keys(bycat)])];
      allCats.forEach(cat=>{
        if(!bycat[cat])return;
        const items=bycat[cat];
        const subtotal=items.reduce((s,x)=>s+(x.amount||0),0);
        const hasPending=items.some(x=>x.pending||x.amount===null);
        cashDetails+=`<div style="padding:6px 14px 2px;font-size:11px;font-weight:800;color:var(--navy);background:#F0F4F9">${cat} 小計：${fmt(subtotal)}${hasPending?' + 待確認':''}</div>`;
        items.forEach(x=>{
          const amtHtml=x.pending||x.amount===null?'<span style="background:#FBF1DF;color:#D99A2B;border-radius:4px;padding:2px 6px;font-size:11px">待確認</span>':'-'+fmt(x.amount);
          cashDetails+=`<div class="detail-row" style="grid-template-columns:80px 1fr auto auto auto"><span class="muted">${x.date}</span><span>${x.name}</span><span class="mono warn-c">${amtHtml}</span><button class="icon-btn" style="font-size:12px" onclick="editExpense('${x.id}','')">✏️</button><button class="icon-btn red" style="font-size:12px" onclick="deleteExpense('${x.id}')">✕</button></div>`;
        });
      });
    }

    // 工地保險
    cashDetails += renderInsurance(p.id);

    blocks+=`<div class="proj-block">
      <div class="proj-header">
        <button class="icon-btn" onclick="projExpanded['${p.id}']=!projExpanded['${p.id}'];render()">${isOpen?'▲':'▼'}</button>
        <div class="proj-info">
          <strong>${p.name}</strong>
          <span class="status-tag tag-${tagCls}">${p.status}</span>
          <div class="muted" style="font-size:12px">${p.address||''}</div>
          <div class="proj-dates">${startDate?'進場 '+startDate:'尚未記錄進場日期'}${endDate?' · 完工 '+endDate:''}</div>
        </div>
        <div class="proj-total">
          <div class="mono" style="font-size:13px;color:var(--muted)">人事 ${fmt(laborTotal)}</div>
          <div class="mono accent" style="font-size:15px;font-weight:800">收 ${fmt(totalReceived)}</div>
          <div class="muted" style="font-size:11px">${contract?'合約 '+fmt(contract):''}</div>
        </div>
        <div style="display:flex;flex-direction:column;gap:4px">
          <button class="icon-btn" onclick="editProject('${p.id}')">✏️</button>
          <button class="icon-btn red" onclick="deleteProject('${p.id}')">🗑️</button>
        </div>
      </div>
      ${isOpen?`<div>
        <div style="display:flex;border-top:1px solid var(--line)">
          <button style="flex:1;padding:8px;border:none;background:${projView==='labor'?'var(--ink)':'var(--surface)'};color:${projView==='labor'?'#fff':'var(--muted)'};font-weight:700;font-size:13px;cursor:pointer" onclick="projExpanded['view_${p.id}']='labor';render()">👷 人事明細</button>
          <button style="flex:1;padding:8px;border:none;background:${projView==='cashflow'?'var(--ink)':'var(--surface)'};color:${projView==='cashflow'?'#fff':'var(--muted)'};font-weight:700;font-size:13px;cursor:pointer" onclick="projExpanded['view_${p.id}']='cashflow';render()">💰 收支表</button>
        </div>
        <div class="expand-detail">${projView==='labor'?laborDetails:cashDetails}</div>
      </div>`:''}
    </div>`;
  });
  return blocks;
}
function updateProjList(){
  const c=document.getElementById('proj-list-container');
  if(!c){render();return;}
  c.innerHTML=buildProjBlocks();
}
function renderProjects(){
  const blocks=buildProjBlocks();
  return `<div class="page">
    <div class="row-between page-head">
      <div><h1>工程案場</h1><p class="muted">共 ${DB.projects.length} 場，含累積人事成本</p></div>
      <button class="btn primary" onclick="editProject(null)">＋ 新增工程</button>
    </div>
    <div class="search-bar"><span>🔍</span><input placeholder="搜尋工程名稱或地址" value="${projSearch}" oninput="projSearch=this.value;updateProjList()"></div>
    <div id="proj-list-container">${blocks}</div>
  </div>`;
}
function editProject(id){
  const p=id?DB.projects.find(x=>x.id===id):{};
  openModal(id?'編輯工程':'新增工程',`
    <div class="form">
      <input type="hidden" id="proj-id" value="${p.id||''}">
      <div class="field"><label>工程名稱</label><input id="proj-name" value="${p.name||''}" placeholder="台南麗區 研磨地坪"></div>
      <div class="field"><label>地址/位置</label><input id="proj-addr" value="${p.address||''}" placeholder="台南市..."></div>
      <div class="field"><label>狀態</label><select id="proj-status">
        <option ${p.status==='進行中'?'selected':''}>進行中</option>
        <option ${p.status==='待開工'?'selected':''}>待開工</option>
        <option ${p.status==='已完工'?'selected':''}>已完工</option>
      </select></div>
      <div class="field"><label>進場日期</label><input id="proj-start" type="date" value="${p.startDate||''}"></div>
      <div class="field"><label>完工日期（未完工留空）</label><input id="proj-end" type="date" value="${p.endDate||''}"></div>
      <div class="field" style="background:#EAF4EC;border-radius:10px;padding:10px"><label>合約總金額（選填）</label><input id="proj-contract" type="number" value="${p.contractAmount||''}" placeholder="0"></div>
      <div class="field" style="background:#FBF1DF;border-radius:10px;padding:10px"><label>系統建立前的歷史人事金額（選填）</label><input id="proj-prev" type="number" value="${p.previousCost||''}" placeholder="0"><p class="muted" style="font-size:11px;margin-top:4px">此工地在使用本系統前已產生的人事成本</p></div>
      <button class="btn primary full" onclick="saveProject()">✓ 儲存</button>
    </div>
  `);
}
function saveProject(){
  const id=document.getElementById('proj-id').value;
  const proj={
    id:id||uid(),
    name:document.getElementById('proj-name').value,
    address:document.getElementById('proj-addr').value,
    status:document.getElementById('proj-status').value,
    startDate:document.getElementById('proj-start').value,
    endDate:document.getElementById('proj-end').value,
    contractAmount:Number(document.getElementById('proj-contract').value)||0,
    previousCost:Number(document.getElementById('proj-prev').value)||0,
  };
  if(!proj.name){showNotice('err','請填寫工程名稱');return;}
  // 檢查重複名稱（排除自己）
  const duplicate=DB.projects.find(p=>p.id!==proj.id&&p.name===proj.name);
  if(duplicate&&!id){
    if(!window._allowDupProj){ customConfirm(`「${proj.name}」已存在（${duplicate.address||'無地址'}）\n確定要新增相同名稱的工程？`, ()=>{ window._allowDupProj=true; saveProject(); }); return; } window._allowDupProj=false;
  }
  const projs=id?DB.projects.map(p=>p.id===id?proj:p):[...DB.projects,proj];
  setDB({...DB,projects:projs});
  closeModal();
  showNotice('ok','✓ 已儲存');
}
function deleteProject(id){
  customConfirm('確定要刪除這個工程？\n相關收支紀錄也會一起刪除。', ()=>{
    setDB({...DB,projects:DB.projects.filter(p=>p.id!==id),payments:(DB.payments||[]).filter(x=>x.projectId!==id),expenses:(DB.expenses||[]).filter(x=>x.projectId!==id),billings:(DB.billings||[]).filter(x=>x.projectId!==id),insurances:(DB.insurances||[]).filter(x=>x.projectId!==id)});
    showNotice('ok','✓ 已刪除');
  });
}

// 收款紀錄
function editPayment(id, projectId){
  const x=id?(DB.payments||[]).find(p=>p.id===id):{};
  openModal(id?'編輯收款':'新增收款',`
    <div class="form">
      <input type="hidden" id="pay-id" value="${x.id||''}">
      <input type="hidden" id="pay-proj" value="${projectId||x.projectId||''}">
      <div class="field"><label>收款日期</label><input id="pay-date" type="date" value="${x.date||todayStr()}"></div>
      <div class="field"><label>金額</label><input id="pay-amount" type="number" min="0" value="${x.amount||''}" placeholder="0"></div>
      <div class="field"><label>備註</label><input id="pay-note" value="${x.note||''}" placeholder="第一期款、尾款…"></div>
      <button class="btn primary full" onclick="savePayment()">✓ 儲存</button>
    </div>
  `);
}
function savePayment(){
  const id=document.getElementById('pay-id').value;
  const item={
    id:id||uid(),
    projectId:document.getElementById('pay-proj').value,
    date:document.getElementById('pay-date').value,
    amount:Number(document.getElementById('pay-amount').value)||0,
    note:document.getElementById('pay-note').value,
  };
  if(!item.amount){showNotice('err','請填寫金額');return;}
  const payments=id?(DB.payments||[]).map(p=>p.id===id?item:p):[...(DB.payments||[]),item];
  setDB({...DB,payments});
  closeModal();
  showNotice('ok','✓ 已儲存');
}
function deletePayment(id){
  customConfirm('確定刪除此收款紀錄？', ()=>{
    setDB({...DB,payments:(DB.payments||[]).filter(p=>p.id!==id)});
  });
}

// 其他支出
const DEFAULT_EXP_CATS=['材料費','搬運費','機具費','保險費','其他'];
function getExpCats(){
  const custom=(DB.expenses||[]).map(e=>e.category).filter(Boolean);
  return [...new Set([...DEFAULT_EXP_CATS,...custom])];
}

// ---- 薪資 ----
let wagesView='byEmployee'; let wagesMonth=monthStr(); let wagesHalf=new Date().getDate()<=15?'first':'second'; let wagesYear=String(new Date().getFullYear());
let wagesExpanded={}; let siteExpanded={};
function renderWages(){
  const projMap=Object.fromEntries(DB.projects.map(p=>[p.id,p]));
  const inPeriod=date=>{
    if(!date.startsWith(wagesMonth))return false;
    const d=Number(date.slice(8,10));
    return wagesHalf==='first'?d<=15:d>=16;
  };
  const bDV=s=>STATUS[s]?.paid?(s==='half'?0.5:1):0;
  const hasOt=a=>getTotalOt(a)>0;
  const tDV=a=>bDV(a.status)+getTotalOt(a);
  const periodLabel=wagesHalf==='first'?'1–15 日':'16 日–月底';

  let content='';
  if(wagesView==='byEmployee'){
    const rows=DB.employees.map(e=>{
      const att=DB.attendance.filter(a=>a.employeeId===e.id&&inPeriod(a.date));
      const days=att.reduce((s,a)=>s+tDV(a),0);
      const otDays=att.filter(a=>getTotalOt(a)>0).length;
      const gross=att.reduce((s,a)=>s+tDV(a)*getRateForDate(e,a.date),0);
      const advances=DB.ledger.filter(l=>l.employeeId===e.id&&l.type==='advance'&&inPeriod(l.date)).reduce((s,l)=>s+l.amount,0);
      const byProj={};
      att.forEach(a=>{
        if(NO_SITE.has(a.status))return;
        const base=bDV(a.status); const rate=getRateForDate(e,a.date);
        const sites=a.projectIds?.length?a.projectIds:['_u'];
        sites.forEach(pid=>{
          if(!byProj[pid])byProj[pid]={days:0,otDays:0,gross:0};
          const otAmt=getOtAmount(a,pid);
          byProj[pid].days+=base; byProj[pid].otDays+=otAmt;
          byProj[pid].gross+=(base+otAmt)*rate;
        });
      });
      const siteRows=Object.entries(byProj).map(([pid,v])=>({pid,name:pid==='_u'?'未指定工地':(projMap[pid]?.name||'已刪除工地'),...v})).sort((a,b)=>b.gross-a.gross);
      return {emp:e,days,otDays,gross,advances,net:gross-advances,siteRows};
    });
    const totalNet=rows.reduce((s,r)=>s+r.net,0);
    let rows_html='';
    rows.forEach(r=>{
      const isOpen=wagesExpanded[r.emp.id];
      let details='';
      if(isOpen){
        if(r.siteRows.length===0) details='<p class="muted" style="padding:8px 14px;font-size:13px">此期間無出勤紀錄</p>';
        else r.siteRows.forEach(s=>{ details+=`<div class="detail-row"><span class="muted">${s.name}</span><span class="mono">${Math.round(s.days*100)/100}天${s.otDays?'(+加班'+s.otDays+')':''}</span><span class="mono">${fmt(s.gross)}</span></div>`; });
      }
      rows_html+=`<div class="expand-block">
        <button class="expand-btn cols5 table-row" onclick="wagesExpanded['${r.emp.id}']=!wagesExpanded['${r.emp.id}'];render()">
          <span style="font-weight:700">${isOpen?'▲':'▼'} ${r.emp.name}</span>
          <span class="mono">${r.days}天${r.otDays?'(+加班'+r.otDays+')':''}</span>
          <span class="mono">${fmt(r.gross)}</span>
          <span class="mono warn-c">${r.advances?'-'+fmt(r.advances):'-'}</span>
          <span class="mono accent">${fmt(r.net)}</span>
        </button>
        ${isOpen?`<div class="expand-detail">${details}</div>`:''}
      </div>`;
    });
    content=`<div class="period-sw">
      <button class="period-btn ${wagesHalf==='first'?'on':''}" onclick="wagesHalf='first';render()">上半月 1–15 日</button>
      <button class="period-btn ${wagesHalf==='second'?'on':''}" onclick="wagesHalf='second';render()">下半月 16 日–月底</button>
    </div>
    <p class="muted" style="margin-bottom:10px">結算區間: ${wagesMonth} · ${periodLabel}</p>
    <div class="table-row cols5 head"><span>員工</span><span>出勤天數</span><span>應發</span><span>借支</span><span>實發</span></div>
    ${rows_html}
    <div class="total-bar"><span>本期實發合計</span><span class="mono">${fmt(totalNet)}</span></div>`;
  } else if(wagesView==='bySite'){
    const siteRange = wagesView==='bySite' ? (window._siteRange||'month') : 'month';
    const byProj={};
    DB.employees.forEach(e=>{
      // 整場：全部出勤紀錄；本月：只看當月
      const att=DB.attendance.filter(a=>{
        if(a.employeeId!==e.id)return false;
        if(siteRange==='all')return true;
        return a.date.startsWith(wagesMonth);
      });
      att.forEach(a=>{
        if(NO_SITE.has(a.status))return;
        const base=bDV(a.status); const rate=getRateForDate(e,a.date);
        const sites=a.projectIds?.length?a.projectIds:['_u'];
        sites.forEach(pid=>{
          const otAmt=getOtAmount(a,pid); const hOt=otAmt>0; const units=base+otAmt;
          if(!byProj[pid])byProj[pid]={emps:{},total:0};
          if(!byProj[pid].emps[e.id])byProj[pid].emps[e.id]={emp:e,days:0,otDays:0,gross:0};
          byProj[pid].emps[e.id].days+=base; byProj[pid].emps[e.id].otDays+=hOt?1:0;
          byProj[pid].emps[e.id].gross+=units*rate; byProj[pid].total+=units*rate;
        });
      });
    });
    let blocks='';
    Object.entries(byProj).sort((a,b)=>b[1].total-a[1].total).forEach(([pid,v])=>{
      const proj=projMap[pid];
      const name=pid==='_u'?'未指定工地':(proj?.name||'已刪除工地');
      // 整場：從工地進場日到今日的日期區間
      const dateRange=siteRange==='all'&&proj?
        `${proj.startDate||'—'} ～ ${proj.endDate||todayStr()}`:'';
      const isOpen=siteExpanded[pid];
      const empArr=Object.values(v.emps).sort((a,b)=>b.gross-a.gross);
      // 加上歷史金額（整場才加）
      const prevCost=siteRange==='all'?(proj?.previousCost||0):0;
      const displayTotal=v.total+prevCost;
      let details='';
      if(isOpen){
        if(prevCost>0) details+=`<div class="detail-row" style="background:#FBF1DF"><span class="muted">系統前歷史金額</span><span>—</span><span class="mono warn-c">${fmt(prevCost)}</span></div>`;
        empArr.forEach(x=>{ details+=`<div class="detail-row"><span class="muted">${x.emp.name}</span><span class="mono">${Math.round(x.days*100)/100}天${x.otDays?'(+加班'+x.otDays+')':''}</span><span class="mono">${fmt(x.gross)}</span></div>`; });
      }
      blocks+=`<div class="expand-block">
        <button class="expand-btn table-row cols3" onclick="siteExpanded['${pid}']=!siteExpanded['${pid}'];render()">
          <span style="font-weight:700">${isOpen?'▲':'▼'} ${name}</span>
          <span class="muted">${dateRange||empArr.length+'位員工'}</span>
          <span class="mono accent">${fmt(displayTotal)}</span>
        </button>
        ${isOpen?`<div class="expand-detail">${details}</div>`:''}
      </div>`;
    });
    content=`
    <div class="period-sw">
      <button class="period-btn ${siteRange==='month'?'on':''}" onclick="window._siteRange='month';render()">本月</button>
      <button class="period-btn ${siteRange==='all'?'on':''}" onclick="window._siteRange='all';render()">整場累積</button>
    </div>
    <p class="muted" style="margin-bottom:10px">${siteRange==='all'?'整場累積（含歷史金額，不限月份）':'統計區間: '+wagesMonth+' 整月'}</p>
    ${Object.keys(byProj).length===0?emptyState('🏗️',siteRange==='all'?'尚無工地出勤紀錄':'本月尚無工地出勤紀錄','到「打卡」分頁登記後即可看到統計'):blocks}`;
  } else {
    // 全年
    const MONTHS=['01','02','03','04','05','06','07','08','09','10','11','12'];
    const rows=DB.employees.map(e=>{
      const att=DB.attendance.filter(a=>a.employeeId===e.id&&a.date.startsWith(wagesYear));
      const byM={};
      MONTHS.forEach(m=>{
        const ma=att.filter(a=>a.date.startsWith(wagesYear+'-'+m));
        const days=ma.reduce((s,a)=>s+tDV(a),0);
        const gross=ma.reduce((s,a)=>s+tDV(a)*getRateForDate(e,a.date),0);
        byM[m]={days,gross};
      });
      const totalDays=att.reduce((s,a)=>s+tDV(a),0);
      const totalGross=att.reduce((s,a)=>s+tDV(a)*getRateForDate(e,a.date),0);
      const otDays=att.filter(a=>getTotalOt(a)>0).length;
      return {emp:e,byM,totalDays,totalGross,otDays};
    }).filter(r=>r.totalDays>0);
    let trs='';
    rows.forEach(r=>{
      let tds='';
      MONTHS.forEach(m=>{ tds+=`<td class="${r.byM[m].days>0?'yt-has':''}">${r.byM[m].days>0?r.byM[m].days:'—'}</td>`; });
      trs+=`<tr><td class="yt-name">${r.emp.name}</td>${tds}<td class="yt-total">${r.totalDays}<br><small>${r.otDays?'加班'+r.otDays:'—'}</small></td><td class="yt-total mono accent">${fmt(r.totalGross)}</td></tr>`;
    });
    content=`<p class="muted" style="margin-bottom:10px">${wagesYear} 年度出勤統計，可用於年終計算</p>
    ${rows.length===0?emptyState('📊',wagesYear+'年尚無出勤紀錄','請確認年份是否正確'):`
    <div class="yearly-wrap"><table class="yearly-table">
      <thead><tr><th>員工</th>${MONTHS.map(m=>`<th>${Number(m)}月</th>`).join('')}<th>全年天數</th><th>全年薪資</th></tr></thead>
      <tbody>${trs}</tbody>
    </table></div>`}`;
  }

  return `<div class="page">
    <div class="row-between page-head">
      <div><h1>薪資結算</h1></div>
      ${wagesView!=='yearly'?`<input type="month" value="${wagesMonth}" onchange="wagesMonth=this.value;render()" style="border:1px solid var(--line);border-radius:8px;padding:7px 8px;font-size:13px">`:
      `<input type="number" value="${wagesYear}" min="2020" max="2099" onchange="wagesYear=this.value;render()" style="border:1px solid var(--line);border-radius:8px;padding:7px 8px;font-size:13px;width:90px">`}
    </div>
    <div class="period-sw">
      <button class="period-btn ${wagesView==='byEmployee'?'on':''}" onclick="wagesView='byEmployee';render()">依員工</button>
      <button class="period-btn ${wagesView==='bySite'?'on':''}" onclick="wagesView='bySite';render()">依工地</button>
      <button class="period-btn ${wagesView==='yearly'?'on':''}" onclick="wagesView='yearly';render()">全年統計</button>
    </div>
    ${content}
  </div>`;
}

  const sorted=[...DB.ledger].sort((a,b)=>(b.date||'').localeCompare(a.date||''));
  let rows='';
  sorted.forEach(l=>{
    const emp=empMap[l.employeeId];
    rows+=`<div class="ledger-row">
      <span style="font-weight:700">${emp?.name||'—'}</span>

function editLedger(id){

function saveLedger(){
  const id=document.getElementById('led-id').value;
  const item={
    id:id||uid(),
    employeeId:document.getElementById('led-emp').value,
    type:document.getElementById('led-type').value,
    amount:Number(document.getElementById('led-amount').value)||0,

function toggleSettled(id){

}
function deleteLedger(id){
  customConfirm('確定刪除此紀錄？', ()=>{
    setDB({...DB,ledger:DB.ledger.filter(l=>l.id!==id)});
  });
}

// 請款管理
// ============================================================
let billSearch='';
let showPaidBills=false;
const BILL_COMPANIES = DB.projects.map ? [] : [];
function getBillCompanies(){ return [...new Set((DB.billings||[]).map(b=>b.companyName).filter(Boolean))]; }

function buildBillRows(){
  const projMap=Object.fromEntries(DB.projects.map(p=>[p.id,p]));
  const billings=[...(DB.billings||[])].sort((a,b)=>(b.billingDate||'').localeCompare(a.billingDate||''));
  // 「已領完」= 有請款金額 且 未領出 = 0
  const isPaid = b => (b.billedAmount||0) > 0 && ((b.billedAmount||0) - (b.receivedAmount||0)) <= 0;
  const paidCount = billings.filter(isPaid).length;
  const filtered=billings.filter(b=>{
    if(!showPaidBills && isPaid(b)) return false; // 預設隱藏已領完
    if(!billSearch) return true;
    return (b.companyName||'').includes(billSearch)||(projMap[b.projectId]?.name||'').includes(billSearch);
  });
  let rows='';
  if(filtered.length===0 && !paidCount) return emptyState('🧾','尚無請款紀錄','點右上角新增第一筆請款');
  if(filtered.length===0 && !billSearch) rows='<p class="muted" style="text-align:center;padding:16px">所有請款均已領完</p>';
  filtered.forEach(b=>{
    const proj=projMap[b.projectId];
    const unpaid=(b.billedAmount||0)-(b.receivedAmount||0);
    const done=isPaid(b);
    rows+=`<div class="card" style="margin-bottom:10px;${done?'opacity:0.6;border-style:dashed':''}">
      <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:8px">
        <div>
          <strong style="font-size:15px">${b.companyName||'—'}</strong>
          ${done?'<span style="font-size:11px;background:#EAF4EC;color:var(--success);border-radius:4px;padding:2px 7px;margin-left:6px;font-weight:700">已領完</span>':''}
          <span class="status-tag tag-ongoing" style="margin-left:6px">${proj?.name||'—'}</span>
          ${b.ownerName?`<div style="font-size:12px;color:var(--muted);margin-top:2px">業主/建設：${b.ownerName}</div>`:''}
        </div>
        <div style="display:flex;gap:4px">
          <button class="icon-btn" onclick="editBilling('${b.id}')">✏️</button>
          <button class="icon-btn red" onclick="deleteBilling('${b.id}')">🗑️</button>
        </div>
      </div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:6px;font-size:13px">
        <div><span class="muted">請款日期</span><br><strong>${b.billingDate||'—'}</strong></div>
        <div><span class="muted">入帳日期</span><br><strong>${b.receiptDate||'待入帳'}</strong></div>
        <div><span class="muted">請款金額</span><br><strong class="mono">${fmt(b.billedAmount||0)}</strong></div>
        <div style="${b.receiptDate&&!b.receivedAmount?'background:#FBE7E2;border-radius:6px;padding:4px 6px':''}">
          <span class="muted">實際領到</span>
          ${b.receiptDate&&!b.receivedAmount?'<span style="font-size:10px;color:#B3402A;font-weight:700"> ⚠️未填</span>':''}
          <br><strong class="mono" style="color:${b.receivedAmount?'var(--success)':'#B3402A'}">${fmt(b.receivedAmount||0)}</strong>
        </div>
        ${b.hasInvoice?`<div><span class="muted">發票金額</span><br><strong class="mono">${fmt(b.invoiceAmount||0)}</strong></div>`:'<div><span class="muted">發票</span><br><span style="color:var(--muted)">無</span></div>'}
        <div style="${unpaid>0?'background:#FBE7E2;border-radius:6px;padding:4px 6px':done?'background:#EAF4EC;border-radius:6px;padding:4px 6px':''}">
          <span class="muted">未領出</span><br>
          <strong class="mono" style="${unpaid>0?'color:#B3402A':done?'color:var(--success)':''}">${done?'✓ 已結清':fmt(unpaid)}</strong>
          ${b.retentionAmount?`<span style="font-size:11px;color:var(--muted)">（含保留款${fmt(b.retentionAmount)}）</span>`:''}
        </div>
      </div>
      ${b.note?`<p class="muted" style="font-size:12px;margin-top:6px;border-top:1px dashed var(--line);padding-top:6px">${b.note}</p>`:''}
    </div>`;
  });
  if(paidCount>0){
    rows+=`<button style="width:100%;border:1px dashed var(--line);background:transparent;border-radius:10px;padding:10px;color:var(--muted);font-size:13px;cursor:pointer;margin-top:4px" onclick="showPaidBills=!showPaidBills;updateBillList()">
      ${showPaidBills?'▲ 隱藏已領完的請款':'▼ 顯示已領完的請款（'+paidCount+'筆）'}
    </button>`;
  }

function getInsExpiry(x){
  // 取最後一次續保的到期日，或原本的到期日
  const renewals=(x.renewals||[]).filter(r=>r.expiryDate);
  if(renewals.length>0) return renewals[renewals.length-1].expiryDate;
  return x.expiryDate||'';
}
function renderInsurance(projectId){
  const ins=(DB.insurances||[]).filter(x=>x.projectId===projectId).sort((a,b)=>a.paymentDate.localeCompare(b.paymentDate));
  let rows='';
  if(ins.length===0){ rows='<p class="muted" style="padding:4px 14px 10px;font-size:13px">尚無保險紀錄</p>'; }
  else {
    ins.forEach(x=>{
      const today=todayStr();
      const soon=new Date(); soon.setDate(soon.getDate()+30);
      const soonStr=`${soon.getFullYear()}-${String(soon.getMonth()+1).padStart(2,'0')}-${String(soon.getDate()).padStart(2,'0')}`;
      const lastExpiry=getInsExpiry(x);
      const isExpired=lastExpiry&&lastExpiry<today;
      const isExpiring=lastExpiry&&!isExpired&&lastExpiry<=soonStr;
      const renewals=x.renewals||[];
      // 續保明細
      let renewHtml='';
      if(renewals.length>0){
        renewals.forEach((r,i)=>{
          const rExpired=r.expiryDate&&r.expiryDate<today;
          const rExpiring=r.expiryDate&&!rExpired&&r.expiryDate<=soonStr;
          renewHtml+=`<div style="font-size:11px;color:var(--muted);padding:2px 0">
            第${i+1}次續保：${r.startDate||'—'} ～ ${r.expiryDate||'—'}，${fmt(r.amount||0)}
            ${rExpired?'<span style="color:#B3402A"> ⚠️已到期</span>':rExpiring?'<span style="color:#D99A2B"> ⏰即將到期</span>':''}
          </div>`;
        });
      }
      const renewalTotal=(x.renewals||[]).reduce((s,r)=>s+(r.amount||0),0);
      const insTotal=(x.amount||0)+renewalTotal;
      rows+=`<div class="detail-row" style="grid-template-columns:80px 1fr auto auto auto;${isExpired?'background:#FBE7E2':isExpiring?'background:#FBF1DF':''}">
        <span class="muted">${x.paymentDate}</span>
        <div>
          <strong style="font-size:13px">${x.note||'工地保險'}</strong><br>
          <span style="font-size:11px;color:var(--muted)">${x.startDate&&x.expiryDate?'原始：'+x.startDate+' ～ '+x.expiryDate:x.expiryDate?'有效至 '+x.expiryDate:''}</span>
          <span style="font-size:11px;color:${isExpired?'#B3402A':isExpiring?'#D99A2B':''}">${isExpired?' ⚠️到期':isExpiring?' ⏰即將到期':''}</span>
          ${renewHtml}
        </div>
        <div style="text-align:right">
          <div class="mono warn-c">${fmt(insTotal)}</div>
          ${renewalTotal>0?`<div style="font-size:10px;color:var(--muted)">原 ${fmt(x.amount||0)}+續 ${fmt(renewalTotal)}</div>`:''}
        </div>
        <button class="icon-btn" style="font-size:12px" onclick="editInsurance('${x.id}','')">✏️</button>
        <button class="icon-btn red" style="font-size:12px" onclick="deleteInsurance('${x.id}')">✕</button>
      </div>`;
    });
  }
  return `<div style="padding:10px 14px 6px;font-weight:700;font-size:13px;color:var(--muted);margin-top:4px">🛡️ 工地保險 <button class="btn sm" style="margin-left:8px" onclick="editInsurance(null,'${projectId}')">＋ 新增</button></div>${rows}`;
}

let invSearch='', invDateFrom='', invDateTo='', invYear='', invMonth='';
let invFilterMode='all'; // 'all'|'year'|'month'|'range'

function getInvIssuerList(){ return [...new Set((DB.invoices||[]).map(x=>x.issuer).filter(Boolean))]; }
function getInvRecipList(){ return [...new Set((DB.invoices||[]).map(x=>x.recipient).filter(Boolean))]; }

function filterInvoices(){
  return (DB.invoices||[]).filter(x=>{
    // 搜尋（開立方或受款方含關鍵字）
    if(invSearch && !(x.issuer||'').includes(invSearch) && !(x.recipient||'').includes(invSearch) && !(x.invoiceNo||'').includes(invSearch)) return false;
    // 日期篩選
    if(invFilterMode==='year' && invYear && !(x.date||'').startsWith(invYear)) return false;
    if(invFilterMode==='month' && invMonth && !(x.date||'').startsWith(invMonth)) return false;
    if(invFilterMode==='range'){
      if(invDateFrom && (x.date||'')<invDateFrom) return false;
      if(invDateTo && (x.date||'')>invDateTo) return false;
    }
    return true;
  }).sort((a,b)=>(b.date||'').localeCompare(a.date||''));
}

function buildInvRows(){
  const filtered=filterInvoices();
  if((DB.invoices||[]).length===0) return emptyState('🗂️','尚無發票紀錄','點右上角新增第一筆發票');
  if(filtered.length===0) return '<p class="muted" style="text-align:center;padding:20px">找不到符合的發票</p>';
  let totalTaxable=0, totalTax=0, totalAmt=0;
  let rows='';
  filtered.forEach(x=>{
    totalTaxable+=(x.taxableSales||0);
    totalTax+=(x.taxAmount||0);
    totalAmt+=(x.totalAmount||0);
    rows+=`<div class="inv-row">
      <div class="inv-row-head">
        <div>
          <span class="inv-issuer">${x.issuer||'—'}</span>
          <span style="color:var(--muted);margin:0 6px">→</span>
          <span class="inv-recipient">${x.recipient||'—'}</span>
        </div>
        <div style="display:flex;gap:4px">
          <button class="icon-btn" onclick="editInvoice('${x.id}')">✏️</button>
          <button class="icon-btn red" onclick="deleteInvoice('${x.id}')">🗑️</button>
        </div>
      </div>
      <div class="inv-grid">
        <div><span class="muted">開立日期</span><br><strong>${x.date||'—'}</strong></div>
        <div><span class="muted">發票號碼</span><br><strong style="font-family:monospace">${x.invoiceNo||'—'}</strong></div>
        <div><span class="muted">應稅銷售額</span><br><strong class="mono">${fmt(x.taxableSales||0)}</strong></div>
        <div><span class="muted">稅額 (5%)</span><br><strong class="mono">${fmt(x.taxAmount||0)}</strong></div>
        <div style="grid-column:1/-1;background:#EAF4EC;border-radius:6px;padding:8px">
          <span class="muted">發票總金額</span>
          <strong class="mono" style="float:right;color:var(--success);font-size:15px">${fmt(x.totalAmount||0)}</strong>
        </div>
      </div>
      ${x.note?`<p class="muted" style="font-size:12px;margin-top:6px">${x.note}</p>`:''}
    </div>`;
  });
  // 合計列
  rows+=`<div class="inv-total-row">
    <span>共 ${filtered.length} 筆合計</span>
    <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-top:10px;text-align:center">
      <div><div class="muted" style="font-size:11px">應稅銷售額合計</div><div class="mono" style="font-weight:800">${fmt(totalTaxable)}</div></div>
      <div><div class="muted" style="font-size:11px">稅額合計</div><div class="mono" style="font-weight:800">${fmt(totalTax)}</div></div>
      <div style="background:#EAF4EC;border-radius:8px;padding:6px"><div class="muted" style="font-size:11px">發票總金額</div><div class="mono" style="font-weight:800;color:var(--success)">${fmt(totalAmt)}</div></div>
    </div>
  </div>`;
  return rows;
}

function autoCalcTax(){
  const taxable=Number(document.getElementById('inv-taxable')?.value)||0;
  const tax=Math.round(taxable*0.05);
  const taxEl=document.getElementById('inv-tax');
  const totalEl=document.getElementById('inv-total');
  if(taxEl) taxEl.value=tax;
  if(totalEl) totalEl.value=taxable+tax;
}
function autoCalcTotal(){
  const taxable=Number(document.getElementById('inv-taxable')?.value)||0;
  const tax=Number(document.getElementById('inv-tax')?.value)||0;
  const totalEl=document.getElementById('inv-total');
  if(totalEl) totalEl.value=taxable+tax;
}
function saveInvoice(){
  const id=document.getElementById('inv-id')?.value||'';
  const item={
    id:id||uid(),
    issuer:document.getElementById('inv-issuer')?.value||'',
    recipient:document.getElementById('inv-recip')?.value||'',
    date:document.getElementById('inv-date')?.value||todayStr(),
    invoiceNo:document.getElementById('inv-no')?.value||'',
    taxableSales:Number(document.getElementById('inv-taxable')?.value)||0,
    taxAmount:Number(document.getElementById('inv-tax')?.value)||0,
    totalAmount:Number(document.getElementById('inv-total')?.value)||0,
    note:document.getElementById('inv-note')?.value||'',
  };
  if(!item.issuer||!item.recipient){showNotice('err','請填寫開立公司與受款公司');return;}
  const invoices=id?(DB.invoices||[]).map(i=>i.id===id?item:i):[...(DB.invoices||[]),item];
  setDB({...DB,invoices});
  closeModal();
  showNotice('ok','✓ 已儲存');
}
function deleteInvoice(id){
  customConfirm('確定刪除此發票紀錄？',()=>{
    setDB({...DB,invoices:(DB.invoices||[]).filter(i=>i.id!==id)});
  });
}
function exportInvoicePDF(){
  const filtered=filterInvoices();
  if(filtered.length===0){showNotice('err','沒有可匯出的發票');return;}
  let totalTaxable=0,totalTax=0,totalAmt=0;
  let rows='';
  filtered.forEach((x,i)=>{
    totalTaxable+=(x.taxableSales||0);
    totalTax+=(x.taxAmount||0);
    totalAmt+=(x.totalAmount||0);
    rows+=`<tr>
      <td>${i+1}</td>
      <td>${x.date||'—'}</td>
      <td>${x.issuer||'—'}</td>
      <td>${x.recipient||'—'}</td>
      <td style="font-family:monospace">${x.invoiceNo||'—'}</td>
      <td style="text-align:right">${(x.taxableSales||0).toLocaleString('zh-TW')}</td>
      <td style="text-align:right">${(x.taxAmount||0).toLocaleString('zh-TW')}</td>
      <td style="text-align:right;font-weight:bold">$${(x.totalAmount||0).toLocaleString('zh-TW')}</td>
      <td>${x.note||''}</td>
    </tr>`;
  });
  const filterDesc=invFilterMode==='year'?`${invYear}年`:invFilterMode==='month'?invMonth:invFilterMode==='range'?(invDateFrom||'')+'～'+(invDateTo||''):'全部';
  const searchDesc=invSearch?` · 關鍵字：${invSearch}`:'';
  const printHtml=`<div id="inv-print-area" style="position:fixed;top:0;left:0;width:100%;height:100%;background:#fff;z-index:9999;overflow:auto;padding:20px;box-sizing:border-box">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px">
      <div>
        <h1 style="font-size:18px;margin:0">🗂️ 睿浤工地管理 — 發票明細</h1>
        <p style="color:#888;font-size:12px;margin:4px 0 0">查詢範圍：${filterDesc}${searchDesc}　共 ${filtered.length} 筆</p>
      </div>
      <button onclick="closePrint()" style="border:none;background:#f1f1f1;border-radius:8px;padding:8px 16px;cursor:pointer;font-size:14px">✕ 關閉</button>
    </div>
    <p style="font-size:12px;color:#666;background:#FBF1DF;padding:8px 12px;border-radius:8px;margin-bottom:12px">📱 iOS 請點右上角分享 → 列印，即可存成 PDF</p>
    <table style="width:100%;border-collapse:collapse;font-size:12px">
      <thead><tr style="background:#20242A;color:#fff">
        <th style="padding:8px 6px">#</th>
        <th style="padding:8px 6px">日期</th>
        <th style="padding:8px 6px">開立公司</th>
        <th style="padding:8px 6px">受款公司</th>
        <th style="padding:8px 6px">發票號碼</th>
        <th style="padding:8px 6px;text-align:right">應稅銷售額</th>
        <th style="padding:8px 6px;text-align:right">稅額</th>
        <th style="padding:8px 6px;text-align:right">總金額</th>
        <th style="padding:8px 6px">備註</th>
      </tr></thead>
      <tbody>${rows}</tbody>
      <tfoot><tr style="background:#20242A;color:#fff;font-weight:bold">
        <td colspan="5" style="padding:8px 6px;text-align:right">合計（${filtered.length}筆）</td>
        <td style="padding:8px 6px;text-align:right">${totalTaxable.toLocaleString('zh-TW')}</td>
        <td style="padding:8px 6px;text-align:right">${totalTax.toLocaleString('zh-TW')}</td>
        <td style="padding:8px 6px;text-align:right;color:#4ade80">$${totalAmt.toLocaleString('zh-TW')}</td>
        <td></td>
      </tr></tfoot>
    </table>
    <style>
      @media print{
        #inv-print-area button{display:none!important}
        #inv-print-area>p{display:none!important}
        #inv-print-area{position:static!important;padding:0!important}
        body>*:not(#inv-print-area){display:none!important}
      }
      #inv-print-area table tbody tr:nth-child(even) td{background:#f9f9f9}
      #inv-print-area table td{border:1px solid #ddd;padding:6px}
    </style>
  </div>`;
  const div=document.createElement('div');
  div.innerHTML=printHtml;
  document.body.appendChild(div.firstChild);
}
function closePrint(){
  const el=document.getElementById('inv-print-area');
  if(el) el.remove();
}
const TABS=[
  {id:'dashboard',icon:'📊',label:'總覽'},
  {id:'employees',icon:'👷',label:'員工'},
  {id:'attendance',icon:'🕐',label:'打卡'},
  {id:'projects',icon:'🏗️',label:'工程'},
  {id:'wages',icon:'💰',label:'薪資'},
  {id:'ledger',icon:'📋',label:'保留款'},
  {id:'billing',icon:'🧾',label:'請款'},
  {id:'invoice',icon:'🗂️',label:'發票'},
];

function render(){
  // 儲存目前焦點狀態（讓搜尋框可以持續打字）
  let _focusId=null, _focusSel=0, _focusVal='';
  const focused=document.activeElement;
  if(focused && focused.tagName==='INPUT' && focused.id){
    _focusId=focused.id;
    _focusSel=focused.selectionStart||0;
    _focusVal=focused.value||'';
  }

  const app=document.getElementById('app');
  const bottomBtns=TABS.map(t=>`<button class="bnav-btn ${currentTab===t.id?'active':''}" onclick="switchTab('${t.id}')"><span class="bnav-icon">${t.icon}</span>${t.label}</button>`).join('');
  app.innerHTML=`
    <div class="topbar">
      <span class="brand">🏗️ 睿浤工地管理</span>
      <div class="backup-actions">
        <button class="btn ghost" onclick="exportData()">⬇ 備份</button>
        <button class="btn ghost" onclick="showImportModal()">⬆ 還原</button>
      </div>
    </div>
    <div id="notice" class="notice" style="display:none"></div>
    <div id="page-content">${pageContent()}</div>
    <nav class="bottombar">${bottomBtns}</nav>
    <div id="modal-overlay" class="modal-overlay" style="display:none" onclick="if(event.target===this)closeModal()">
      <div class="modal">
        <div class="modal-head">
          <h3 id="modal-title"></h3>
          <button class="icon-btn" onclick="closeModal()">✕</button>
        </div>
        <div class="modal-body" id="modal-body"></div>
      </div>
    </div>
  `;

  // 還原焦點，讓搜尋框持續可以打字
  if(_focusId){
    const el=document.getElementById(_focusId);
    if(el){
      el.focus();
      try{ el.setSelectionRange(_focusSel,_focusSel); }catch(e){}
    }
  }
}

render();
</script>

 const target=document.querySelector('.invoice-preview,.invoice,.receipt,main')||document.body;

 pdf.addImage(img,"PNG",10,10,w,h);

};
